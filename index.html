<!DOCTYPE html>
<html lang="zh-TW" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>大阪6天5夜自由行</title>
    <!-- iOS Web App Features -->
    <meta name="theme-color" id="theme-color-meta" content="#f2f2f7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Leaflet for Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <div id="app">
        <header id="app-header">
            <h1 id="page-title">行程總覽</h1>
        </header>

        
        <div id="traffic-banner" class="traffic-banner" style="display:none;">
            <i class="fa-solid fa-triangle-exclamation"></i> <span id="traffic-text">即時交通狀態：連線中...</span>
        </div>
        <main id="app-content">
            <!-- 1. 行程總覽 -->
            <section id="view-itinerary" class="view active">
                
                <div class="header-card">
                    <div id="live-weather-rate" class="live-badge"><span><i class="fa-solid fa-spinner fa-spin"></i> 同步大版即時天氣與匯率...</span></div>
                    <div class="header-card-bg"></div>
                    <h2>京阪神 6 天自由行</h2>
                    <p><i class="fa-regular fa-calendar" style="margin-right:6px;"></i> 2026/7/27 - 8/1 <span style="margin:0 10px;">|</span> <i class="fa-solid fa-plane-departure" style="margin-right:6px;"></i> 國泰航空</p>
                </div>
                
                <div class="day-tabs" id="day-tabs">
                    <!-- Dynamic Tabs injected via JS -->
                </div>
                
                <div class="timeline-container" id="timeline-content">
                    <!-- Dynamic Timeline injected via JS -->
                </div>
            </section>

            <!-- 2. 旅行地圖 -->
            <section id="view-map" class="view">
                <div id="map-container"></div>
            </section>

            <!-- 3. 行李清單 -->
            <section id="view-checklist" class="view">
                <div class="checklist-header">
                    <h2>行前準備清單</h2>
                    <p>依照分類打勾，狀態會自動儲存在手機中</p>
                </div>
                <div class="progress-container">
                    <div class="progress-text"><span>完成度 <span id="progress-percent">0%</span></span> <span id="reset-checklist" style="cursor:pointer; color:var(--primary-color); font-size:13px; float:right; background:var(--primary-light); padding:2px 8px; border-radius:10px;"><i class="fa-solid fa-rotate-right"></i> 重置</span></div><div style="display:none;"> <span id="progress-percent">0%</span></div>
                    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-bar"></div></div>
                </div>
                <div id="checklist-container">
                    <!-- Dynamic Checklist injected via JS -->
                </div>
            </section>

            <!-- 4. 實用工具 -->
            <section id="view-tools" class="view">
                <div class="tools-grid">

                    
                    <div class="tool-card" onclick="openGacha()">
                        <div class="icon" style="color: #ff9500;"><i class="fa-solid fa-utensils"></i></div>
                        <h3>美食轉蛋機</h3>
                        <p>選擇困難救星</p>
                    </div>

                    <div class="tool-card emergency" onclick="showSOSMode()">
                        <div class="icon"><i class="fa-solid fa-hand-holding-hand"></i></div>
                        <h3>問路求助卡</h3>
                        <p>大字報日文翻譯</p>
                    </div>

                    <div class="tool-card" data-tool-info="【iOS 蘋果手機】\n1. 點擊底下 Safari 工具列的「分享」圖示（方框往上的箭頭）。\n2. 往下滑找到「加入主畫面」並點擊。\n3. 按下「新增」。\n\n【Android 安卓手機】\n1. 點擊 Chrome 右上角「⋮」選單。\n2. 點擊「加到主畫面」或「安裝應用程式」。\n\n安裝後即可在無網路時，甚至飛航模式下使用本手冊！">
                        <i class="fa-solid fa-mobile-screen"></i>
                        <h3>安裝到手機</h3>
                        <p>離線使用與App化教學</p>
                    </div>

                    <div class="tool-card" data-tool-info="【機場交通】\n乘 Haruka 特急直達京都只要 80 分鐘。\n\n【市區轉乘】\n強烈推薦在錢包 App 中綁定 ICOCA 或 Suica，進出站免買票，便利商店也能輕鬆嗶卡。">
                        <i class="fa-solid fa-train"></i>
                        <h3>交通指南</h3>
                        <p>ICOCA, Haruka</p>
                    </div>
                    <div class="tool-card" onclick="openLanguageModal()">
                        <div class="icon" style="color: #af52de;"><i class="fa-solid fa-language"></i></div>
                        <h3>真人發音翻譯</h3>
                        <p>點擊播放實用日語</p>
                    </div>
                    <div class="tool-card emergency" onclick="alert('【日本當地緊急電話】\n報警：110\n救護車、火警：119\n海上保安：118\n\n【台灣駐日機關】\n台北經濟文化代表處(東京)：03-3280-7811\n護照遺失等緊急協助，請聯絡外交部緊急聯絡中心。')">
                        <i class="fa-solid fa-phone-volume"></i>
                        <h3>緊急聯絡</h3>
                        <p>報警、就醫專線</p>
                    </div>
                    <div class="tool-card" onclick="alert('滿 5,000 日圓(未稅) 即可免稅！\n\n1. 現行制度：結帳時出示護照正本，直接以「免稅價」結帳。\n2. 最新改制預告：未來可能改為「出境時至機場確認退稅款」。\n\n⚠️ 免稅包裝在離開日本前【請勿拆封】！')">
                        <i class="fa-solid fa-calculator"></i>
                        <h3>免稅說明</h3>
                        <p>退稅規定懶人包</p>
                    </div>
                    <div class="tool-card" data-tool-info="日本夏季（7-8月）非常炎熱且常有午後雷陣雨。\n\n【必備物品】\n1. 隨身涼風扇\n2. 防曬乳、防曬外套\n3. 晴雨兩用摺疊傘\n4. 隨時補充水分與電解質">
                        <i class="fa-solid fa-cloud-sun"></i>
                        <h3>天氣預報</h3>
                        <p>夏季旅遊須知</p>
                    </div>
                    <div class="tool-card" onclick="alert('國泰航空最新行李規定 (依開票艙等為主)：\n\n【托運行李】\n經濟艙一般包含 2件，單件不可超過 23kg。\n\n【手提行李】\n1件登機箱 (不超過 56x36x23 cm) + 1件小型個人物品，總重不超過 7kg。\n\n⚠️ 行動電源、打火機必須隨身攜帶，不可托運！')">
                        <i class="fa-solid fa-plane"></i>
                        <h3>登機規定</h3>
                        <p>國泰航空行李限制</p>
                    </div>
                </div>
            </section>
        </main>

        <!-- 底部導覽列 -->
        <nav id="bottom-nav">
            <a href="#" class="nav-item active" data-target="view-itinerary" data-title="行程總覽">
                <i class="fa-solid fa-map-location-dot"></i>
                <span>行程</span>
            </a>
            <a href="#" class="nav-item" data-target="view-map" data-title="旅行地圖">
                <i class="fa-solid fa-location-dot"></i>
                <span>地圖</span>
            </a>
            <a href="#" class="nav-item" data-target="view-checklist" data-title="行李清單">
                <i class="fa-solid fa-suitcase-rolling"></i>
                <span>清單</span>
            </a>
            <a href="#" class="nav-item" data-target="view-tools" data-title="實用工具">
                <i class="fa-solid fa-toolbox"></i>
                <span>工具</span>
            </a>
        </nav>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="data.js"></script>
    <script src="app.js"></script>

    <!-- Custom iOS Modal -->
    <div id="custom-modal" class="modal-overlay">
        <div class="modal-box">
            <h3 id="modal-title"></h3>
            <div class="modal-body" id="modal-body"></div>
            <button id="modal-btn-close">我知道了</button>
        </div>
    </div>
</body>
</html>
